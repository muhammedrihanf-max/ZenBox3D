name: Build ZenBox 3D

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    - name: Install Dependencies
      run: |
        go mod download
    - name: Build Windows EXE
      run: |
        go build -v -o ZenBox3D.exe .
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ZenBox3D-Windows
        path: ZenBox3D.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Set up Android SDK
      uses: android-actions/setup-android@v2
    - name: Install gomobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        gomobile init
    - name: Build Android APK
      run: |
        gomobile build -v -target android -androidapi 21 -o zenbox3d.apk .
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ZenBox3D-Android
        path: zenbox3d.apk
